delivery_option:
  title: "Open WebUI with vLLM on GPU"

  short_description: |
    Deploy Open WebUI with vLLM for GPU-accelerated LLM inference. Includes VPC, ALB, Auto Scaling Group, Route 53 DNS, CloudWatch logging, and persistent EBS storage with automated backups.

  long_description: |
    This CloudFormation template deploys a production-ready Open WebUI environment with vLLM backend for GPU-accelerated large language model inference.

    WHAT'S DEPLOYED

    - VPC with public and private subnets (or use your existing VPC)
    - Application Load Balancer with HTTPS (requires ACM certificate)
    - Auto Scaling Group with GPU-enabled EC2 instance (G6/G6e family)
    - Route 53 DNS record pointing to the load balancer
    - Persistent EBS data volume with automated daily backups via AWS Backup
    - CloudWatch Log Groups for application and system logs
    - AWS Secrets Manager secret for secure credential storage
    - IAM roles with least-privilege permissions

    FEATURES

    - Pre-tested open-source models: Qwen 2.5 Coder, Microsoft Phi-4, NVIDIA Nemotron
    - OpenAI-compatible API for integration with tools like aider, LangChain, and Continue.dev
    - Custom model support via ModelOverride parameter
    - Optional custom configuration via SSM Parameter Store
    - Systems Manager Session Manager access (no SSH keys required)

    REQUIREMENTS

    - Route 53 hosted zone for DNS
    - ACM certificate for HTTPS
    - Sufficient service quota for GPU instances in your region

    INSTANCE SIZING

    - g6.xlarge (default): 24GB VRAM - 7B models
    - g6e.xlarge / g6.2xlarge: 48GB VRAM - 14B models
    - g6e.2xlarge / g6.4xlarge: 96GB VRAM - 32B models

    EXTERNAL CONNECTIONS

    This product connects to Hugging Face (huggingface.co) to download the selected LLM model on first instance boot. Model sizes range from 4GB to 60GB. No customer data is transmitted. All inference is performed locally.

    Deployment takes 15-60 minutes depending on model size due to model download and loading.

  recommended_instance_type: "g6.xlarge"

  usage_instructions: |
    Full documentation: https://github.com/ordinaryexperts/aws-marketplace-oe-patterns-open-webui

    QUICK START

    1. Launch the CloudFormation stack with required parameters:
       - DnsHostname: Your hostname (e.g., ai.example.com)
       - DnsRoute53HostedZoneName: Your Route 53 hosted zone (e.g., example.com)
       - AlbCertificateArn: ARN of an ACM certificate for HTTPS
       - AlbIngressCidr: IP range allowed to access (0.0.0.0/0 for public)

    2. Wait 15-60 minutes for deployment to complete

    3. Access Open WebUI at https://your-hostname

    4. Create your admin account on first login

    5. Generate API keys in Settings > Account for external tools

    USING WITH AIDER OR OTHER OPENAI CLIENTS

    export OPENAI_API_KEY='your-open-webui-api-key'
    export OPENAI_API_BASE='https://your-hostname/api'
    aider --model 'openai/Qwen/Qwen2.5-Coder-7B-Instruct'

    SUPPORT

    Free 1-hour onboarding session via Zoom included.
    Email support@ordinaryexperts.com to schedule.
